<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>医疗助手</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-brand-row">
          <div class="sidebar-brand">
            <img
              class="logo-mark"
              src="/assets/logo.png"
              width="32"
              height="32"
              alt=""
              decoding="async"
            />
            <span class="logo-text">医疗助手</span>
          </div>
          <button
            type="button"
            class="sidebar-toggle-btn sidebar-toggle-collapse desktop-only"
            id="btnCollapseSidebar"
            aria-label="收起边栏"
            title="收起边栏"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="5" width="18" height="14" rx="2" />
              <line x1="9" y1="5" x2="9" y2="19" />
            </svg>
          </button>
        </div>
        <button type="button" class="btn-new-chat" id="btnNewChat">
          <span class="btn-new-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
              <path d="M12 7v6M9 10h6" />
            </svg>
          </span>
          开启新对话
        </button>
      </div>
      <nav class="sidebar-section-title">最近</nav>
      <ul class="chat-history" id="chatHistory"></ul>
      <div class="sidebar-footer">
        <span class="hint">仅可用于临床辅助，最终请以执业医师为准</span>
      </div>
    </aside>

    <main class="main">
      <header class="main-header" id="mainHeader">
        <div class="main-header-start">
          <div class="collapsed-toolbar" id="collapsedToolbar" aria-hidden="true">
            <img
              class="logo-mark logo-mark-compact"
              src="/assets/logo.png"
              width="32"
              height="32"
              alt=""
              decoding="async"
            />
            <div class="collapsed-actions-pill" role="toolbar" aria-label="侧栏已收起时的快捷操作">
              <button type="button" class="pill-icon-btn" id="btnExpandSidebar" aria-label="打开边栏" title="打开边栏">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <rect x="3" y="5" width="18" height="14" rx="2" />
                  <line x1="9" y1="5" x2="9" y2="19" />
                </svg>
              </button>
              <button
                type="button"
                class="pill-icon-btn"
                id="btnNewChatCompact"
                aria-label="开启新对话"
                title="开启新对话"
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                  <path d="M12 7v6M9 10h6" />
                </svg>
              </button>
            </div>
          </div>
          <button type="button" class="icon-btn mobile-only" id="btnOpenSidebar" aria-label="菜单">☰</button>
        </div>
        <h1 class="main-title" id="mainTitle">医疗助手</h1>
        <div class="main-header-end" aria-hidden="true"></div>
      </header>

      <div class="center-stage" id="welcomeStage">
        <div class="welcome-hero">
          <h2 class="welcome-title">今天有什么可以帮到你？</h2>
          <p class="welcome-sub">描述症状、上传化验单或影像截图，我会为你梳理思路。</p>
          <div class="welcome-suggestions" id="welcomeSuggestions" role="group" aria-label="常见医疗问题"></div>
        </div>
      </div>

      <div class="thread-wrap hidden" id="threadWrap">
        <div class="thread-scroll" id="threadScroll"></div>
      </div>

      <div class="composer-outer">
        <div class="composer-inner">
          <div class="image-preview-row hidden" id="imagePreviewRow">
            <div class="image-chip" id="imageChip">
              <img alt="" id="imageThumb" />
              <button type="button" class="chip-remove" id="btnRemoveImage" aria-label="移除图片">×</button>
            </div>
          </div>
          <div class="composer-bar">
            <input type="file" id="fileInput" accept="image/*" class="hidden" />
            <button type="button" class="composer-attach" id="btnAttach" title="上传图片" aria-label="上传图片">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
            <textarea
              id="inputText"
              class="composer-input"
              rows="1"
              placeholder="给 医疗助手 发送消息"
              maxlength="16000"
            ></textarea>
            <button type="button" class="composer-send" id="btnSend" title="发送" aria-label="发送">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div class="sidebar-backdrop hidden" id="sidebarBackdrop"></div>
  <script src="/assets/app.js"></script>
</body>
</html>
