<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智诊宝</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-brand-row">
          <div class="sidebar-brand">
            <img
              class="logo-mark"
              src="/assets/logo.png"
              width="32"
              height="32"
              alt=""
              decoding="async"
            />
            <span class="logo-text">智诊宝</span>
          </div>
          <button
            type="button"
            class="sidebar-toggle-btn sidebar-toggle-collapse desktop-only"
            id="btnCollapseSidebar"
            aria-label="收起边栏"
            title="收起边栏"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="5" width="18" height="14" rx="2" />
              <line x1="9" y1="5" x2="9" y2="19" />
            </svg>
          </button>
        </div>
        <button type="button" class="btn-new-chat" id="btnNewChat">
          <span class="btn-new-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
              <path d="M12 7v6M9 10h6" />
            </svg>
          </span>
          开启新对话
        </button>
      </div>
      <nav class="sidebar-section-title">最近</nav>
      <ul class="chat-history" id="chatHistory"></ul>
      <div class="sidebar-footer">
        <span class="hint">仅可用于临床辅助，最终请以执业医师为准</span>
      </div>
    </aside>

    <main class="main">
      <header class="main-header" id="mainHeader">
        <div class="main-header-start">
          <div class="collapsed-toolbar" id="collapsedToolbar" aria-hidden="true">
            <img
              class="logo-mark logo-mark-compact"
              src="/assets/logo.png"
              width="32"
              height="32"
              alt=""
              decoding="async"
            />
            <div class="collapsed-actions-pill" role="toolbar" aria-label="侧栏已收起时的快捷操作">
              <button type="button" class="pill-icon-btn" id="btnExpandSidebar" aria-label="打开边栏" title="打开边栏">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <rect x="3" y="5" width="18" height="14" rx="2" />
                  <line x1="9" y1="5" x2="9" y2="19" />
                </svg>
              </button>
              <button
                type="button"
                class="pill-icon-btn"
                id="btnNewChatCompact"
                aria-label="开启新对话"
                title="开启新对话"
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                  <path d="M12 7v6M9 10h6" />
                </svg>
              </button>
            </div>
          </div>
          <button type="button" class="icon-btn mobile-only" id="btnOpenSidebar" aria-label="菜单">☰</button>
        </div>
        <h1 class="main-title" id="mainTitle">智诊宝</h1>
        <div class="main-header-end" id="mainHeaderEnd">
          <button type="button" class="auth-login-btn" id="btnLogin">登录</button>
          <div class="auth-user-wrap hidden" id="authUserWrap">
            <span class="auth-avatar" id="authAvatar">U</span>
            <span class="auth-name" id="authName"></span>
            <div class="auth-user-menu hidden" id="authUserMenu">
              <button type="button" class="auth-menu-item" id="btnOpenSettings">设置</button>
              <button type="button" class="auth-menu-item" id="btnLogout">退出登录</button>
            </div>
          </div>
        </div>
      </header>

      <div class="center-stage" id="welcomeStage">
        <div class="welcome-hero">
          <h2 class="welcome-title">今天有什么可以帮到你？</h2>
          <p class="welcome-sub">描述症状、上传化验单或影像截图，我会为你梳理思路。</p>
          <div class="welcome-suggestions" id="welcomeSuggestions" role="group" aria-label="常见医疗问题"></div>
        </div>
      </div>

      <div class="thread-wrap hidden" id="threadWrap">
        <div class="thread-scroll" id="threadScroll"></div>
      </div>

      <div class="composer-outer">
        <div class="composer-inner">
          <div class="image-preview-row hidden" id="imagePreviewRow">
            <div class="image-chip" id="imageChip">
              <img alt="" id="imageThumb" />
              <button type="button" class="chip-remove" id="btnRemoveImage" aria-label="移除图片">×</button>
            </div>
          </div>
          <div class="composer-bar">
            <input type="file" id="fileInput" accept="image/*" class="hidden" />
            <button type="button" class="composer-attach" id="btnAttach" title="上传图片" aria-label="上传图片">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
            <textarea
              id="inputText"
              class="composer-input"
              rows="1"
              placeholder="给 智诊宝 发送消息"
              maxlength="16000"
            ></textarea>
            <button type="button" class="composer-send" id="btnSend" title="发送" aria-label="发送">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div class="sidebar-backdrop hidden" id="sidebarBackdrop"></div>
  <div class="auth-backdrop hidden" id="authBackdrop"></div>
  <div class="auth-modal hidden" id="authModal" role="dialog" aria-modal="true" aria-labelledby="authTitle">
    <div class="auth-panel">
      <button type="button" class="auth-close-btn" id="btnCloseAuthModal" aria-label="关闭登录弹窗">×</button>
      <h2 class="auth-title" id="authTitle">登录以解锁更多功能</h2>
      <div class="auth-tabs" role="tablist" aria-label="登录注册切换">
        <button type="button" class="auth-tab active" id="tabLogin">登录</button>
        <button type="button" class="auth-tab" id="tabRegister">注册</button>
      </div>

      <form class="auth-form" id="loginForm">
        <input type="text" id="loginUsername" class="auth-input" placeholder="请输入账号" autocomplete="username" />
        <input type="password" id="loginPassword" class="auth-input" placeholder="请输入密码" autocomplete="current-password" />
        <div class="captcha-row">
          <input type="text" id="loginCaptchaInput" class="auth-input" placeholder="请输入验证码" />
          <button type="button" class="captcha-btn" id="btnRefreshCaptchaLogin">
            <img id="loginCaptchaImage" alt="验证码" />
          </button>
        </div>
        <button type="submit" class="auth-submit-btn">登录</button>
      </form>

      <form class="auth-form hidden" id="registerForm">
        <input type="text" id="registerUsername" class="auth-input" placeholder="请输入账号" autocomplete="username" />
        <input type="text" id="registerNickname" class="auth-input" placeholder="请输入昵称" autocomplete="nickname" />
        <input type="password" id="registerPassword" class="auth-input" placeholder="请输入密码" autocomplete="new-password" />
        <input type="password" id="registerConfirmPassword" class="auth-input" placeholder="请确认密码" autocomplete="new-password" />
        <div class="captcha-row">
          <input type="text" id="registerCaptchaInput" class="auth-input" placeholder="请输入验证码" />
          <button type="button" class="captcha-btn" id="btnRefreshCaptchaRegister">
            <img id="registerCaptchaImage" alt="验证码" />
          </button>
        </div>
        <button type="submit" class="auth-submit-btn">注册</button>
      </form>

    </div>
  </div>
  <div class="settings-route hidden" id="settingsRoute">
    <div class="settings-route-inner">
      <div class="settings-page" id="settingsHomePage">
        <div class="settings-profile-hero">
          <div class="settings-profile-avatar" id="settingsProfileAvatar">U</div>
          <h2 class="settings-profile-name" id="settingsProfileName">用户</h2>
          <p class="settings-profile-username" id="settingsProfileUsername">@username</p>
        </div>

        <section class="settings-group">
          <h3 class="settings-group-title" id="settingsTitle">个人资料</h3>
          <div class="settings-actions">
            <button type="button" class="settings-action-btn" id="btnNicknameSettings">修改昵称</button>
            <button type="button" class="settings-action-btn" id="btnPasswordSettings">修改密码</button>
          </div>
        </section>

        <section class="settings-group">
          <h3 class="settings-group-title">数据管理</h3>
          <div class="settings-actions">
            <button type="button" class="settings-action-btn" id="btnClearChatHistory">清空对话记录</button>
            <button type="button" class="settings-action-btn settings-action-danger" id="btnDeleteAccount">删除账号并退出登录</button>
            <button type="button" class="settings-action-btn" id="btnBackToChatFromHome">返回对话</button>
          </div>
        </section>
      </div>

      <form class="auth-form hidden settings-page settings-form-page" id="settingsNicknameForm">
        <button type="button" class="settings-back-btn" id="btnBackFromNickname">← 返回设置</button>
        <h2 class="settings-title">个人资料</h2>
        <p class="settings-subtitle">修改昵称与头像地址</p>
        <div class="settings-avatar-editor">
          <img id="settingsAvatarPreview" class="settings-avatar-preview" src="/assets/picture.webp" alt="头像预览" />
          <input type="file" id="settingsAvatarFile" accept="image/*" class="hidden" />
          <button type="button" class="settings-avatar-upload-btn" id="btnPickSettingsAvatar">选择本地头像</button>
        </div>
        <div class="settings-form-card">
          <input type="text" id="settingsNickname" class="auth-input" placeholder="昵称" />
        </div>
        <button type="submit" class="auth-submit-btn">完成</button>
      </form>

      <form class="auth-form hidden settings-page settings-form-page" id="settingsPasswordForm">
        <button type="button" class="settings-back-btn" id="btnBackFromPassword">← 返回设置</button>
        <h2 class="settings-title">修改密码</h2>
        <p class="settings-subtitle">请填写旧密码和新密码</p>
        <div class="settings-form-card">
          <input type="password" id="settingsOldPassword" class="auth-input" placeholder="旧密码" />
          <input type="password" id="settingsNewPassword" class="auth-input" placeholder="新密码" />
          <input type="password" id="settingsConfirmNewPassword" class="auth-input" placeholder="确认新密码" />
          <div class="captcha-row">
            <input type="text" id="settingsCaptchaInput" class="auth-input" placeholder="请输入验证码" />
            <button type="button" class="captcha-btn" id="btnRefreshCaptchaSettings">
              <img id="settingsCaptchaImage" alt="验证码" />
            </button>
          </div>
        </div>
        <button type="submit" class="auth-submit-btn">完成</button>
      </form>

      <div class="settings-page hidden settings-form-page" id="settingsClearPage">
        <button type="button" class="settings-back-btn" id="btnBackFromClear">← 返回设置</button>
        <h2 class="settings-title">清空对话记录</h2>
        <p class="settings-subtitle">该操作将清空当前账号下全部历史对话。</p>
        <button type="button" class="auth-submit-btn" id="btnConfirmClearChatHistory">确认清空</button>
      </div>

      <div class="settings-page hidden settings-form-page" id="settingsDeletePage">
        <button type="button" class="settings-back-btn" id="btnBackFromDelete">← 返回设置</button>
        <h2 class="settings-title">删除账号并退出登录</h2>
        <p class="settings-subtitle">账号一经删除无法恢复。</p>
        <button type="button" class="auth-submit-btn settings-delete-confirm-btn" id="btnConfirmDeleteAccount">确认删除账号</button>
      </div>
    </div>
  </div>
  <script src="/assets/app.js"></script>
</body>
</html>
